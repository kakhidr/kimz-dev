<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — KiMZ.Dev</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/clark.css">
  <style>
    .error-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
    .error-page h1 { font-size: 72px; color: var(--gold); margin-bottom: 16px; }
    .error-page h2 { font-size: 24px; font-weight: 400; margin-bottom: 12px; }
    .error-page p { color: var(--text-muted); margin-bottom: 32px; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <h1>404</h1>
      <h2>Page not found</h2>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <a href="/" class="btn btn-primary">Back to Home</a>
    </div>
  </div>
</body>
</html>
